# ====================================================================
# Bloque 1: Configuracion del servidor
# ====================================================================
# Puerto donde Spring Boot expondra la API. 8080 es el estandar de Tomcat.
# Si tienes otro proceso en ese puerto, cambia este numero (por ejemplo 8081).
server.port=8080

# ====================================================================
# Bloque 2: Base de datos H2 en memoria
# ====================================================================
# La URL JDBC le dice a Spring como conectarse. Las partes:
#   - jdbc:h2 -> protocolo, indica que es base H2
#   - mem:oreo -> "mem" significa "en memoria" y "oreo" es el nombre logico
#   - DB_CLOSE_DELAY=-1 -> mantiene la base viva mientras la JVM viva, sin
#     este parametro la base se borra apenas se cierra la primera conexion
spring.datasource.url=jdbc:h2:mem:oreo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Activamos la consola web de H2. Te permitira ver las tablas y datos
# directamente en el navegador entrando a http://localhost:8080/h2-console
# Es una herramienta de desarrollo muy util para debuggear.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ====================================================================
# Bloque 3: JPA / Hibernate
# ====================================================================
# ddl-auto=create-drop le dice a Hibernate: "lee mis @Entity al arrancar,
# crea las tablas en la base, y al apagar borralas todas". En produccion
# JAMAS se usa esto, pero en hackathon es ideal porque cada arranque empieza
# con base limpia y no tienes que preocuparte por migraciones.
spring.jpa.hibernate.ddl-auto=create-drop

# Muestra en la consola las queries SQL que Hibernate ejecuta. Util para debug,
# en produccion se desactivaria por ruido y por seguridad.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Le decimos explicitamente a Hibernate que use el dialecto de H2,
# asi genera SQL compatible con esa base.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ====================================================================
# Bloque 4: JWT (autenticacion por tokens)
# ====================================================================
# La sintaxis ${VARIABLE:default} significa: "si existe la variable de entorno
# JWT_SECRET, usa su valor; si no, usa el default que viene despues de los dos puntos".
# Esto te permite arrancar sin haber definido nada y a la vez permite a tu
# equipo definir un secreto real cuando despliegan en produccion.
#
# IMPORTANTE: la clave debe tener al menos 32 caracteres porque HS256 (el
# algoritmo de firma que usaremos) requiere claves de 256 bits o mas. Si la
# clave es mas corta, JJWT lanza excepcion al arrancar.
app.jwt.secret=${JWT_SECRET:cambia-esta-clave-larga-de-al-menos-32-caracteres-para-hackathon-oreo}
app.jwt.expiration-seconds=3600

# ====================================================================
# Bloque 5: Mail (lo configurara la persona B)
# ====================================================================
# Estas propiedades activan automaticamente el bean JavaMailSender que B
# inyectara en su EmailService. Las dejamos con placeholders para que el
# proyecto arranque sin necesidad de tener credenciales reales.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ====================================================================
# Bloque 6: GitHub Models LLM (lo usara la persona B)
# ====================================================================
# Tres propiedades personalizadas que B leera con @Value para llamar al LLM.
# Igual que JWT, usan placeholders por defecto para no bloquear el arranque.
app.llm.github-token=${GITHUB_TOKEN:placeholder}
app.llm.url=${GITHUB_MODELS_URL:https://models.github.ai/inference/chat/completions}
app.llm.model-id=${MODEL_ID:openai/gpt-5-mini}

# ====================================================================
# Bloque 7: Logging
# ====================================================================
# Niveles de log para ver mejor lo que pasa durante el desarrollo.
# DEBUG en nuestro paquete nos muestra info detallada de nuestro codigo.
logging.level.org.springframework.security=INFO
logging.level.com.example.oreo2=DEBUG